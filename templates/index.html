{% extends "base.html" %}

{% block title %}Activities — Property Manager{% endblock %}

{% block content %}

<!-- Add Activity Form -->
<h2 class="section-title">Log New Activity</h2>

<form method="POST" action="/activities">
    <input type="hidden" name="address" id="address-hidden">

    <div class="form-grid">
        <div class="form-group full-width">
            <label for="address-input">Location / Address</label>
            <div class="autocomplete-wrapper">
                <input
                    type="text"
                    id="address-input"
                    placeholder="Start typing an address..."
                    autocomplete="off"
                    required
                >
                <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
            </div>
        </div>

        <div class="form-group full-width">
            <label for="note">Note</label>
            <textarea id="note" name="note" placeholder="Describe the activity..." required></textarea>
        </div>
    </div>

    <button type="submit" class="submit-btn">Save Activity</button>
</form>

<hr style="margin: 40px 0; border: none; border-top: 2px solid #f0f0f0;">

<!-- Activity List -->
<h2 class="section-title">Activities</h2>

<!-- Top bar: filter toggle | search | export -->
<div class="filter-toggle-row">
    <button type="button" class="filter-toggle-btn" id="filter-toggle-btn" title="Filter">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        <span class="filter-active-dot{% if filter_date_from or filter_date_to or filter_usernames %} visible{% endif %}" id="filter-active-dot" title="Filters active"></span>
    </button>

    <div class="search-bar-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
            type="text"
            id="search-address"
            class="search-bar-input"
            placeholder="Search by address..."
            autocomplete="off"
            value="{{ filter_address }}"
        >
    </div>

    <a id="export-btn" href="/activities/export?filter_address={{ filter_address|urlencode }}&filter_date_from={{ filter_date_from|urlencode }}&filter_date_to={{ filter_date_to|urlencode }}{% for u in filter_usernames %}&filter_usernames={{ u|urlencode }}{% endfor %}"
       class="export-btn" title="Export CSV">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </a>
</div>

<!-- Filter panel (date + logged by only) -->
<div class="filter-section{% if filter_date_from or filter_date_to or filter_usernames %} open{% endif %}" id="filter-section">
    <form method="GET" action="/" id="filter-form">
        <input type="hidden" name="filter_address" id="filter-address-hidden" value="{{ filter_address }}">
        <div class="form-grid">
            <div class="form-group">
                <label>Logged by</label>
                <div class="multiselect" id="user-multiselect">
                    <button type="button" class="multiselect-toggle" id="user-multiselect-toggle">
                        <span id="user-multiselect-label">Anyone</span>
                        <span class="multiselect-arrow">&#9660;</span>
                    </button>
                    <div class="multiselect-dropdown" id="user-multiselect-dropdown">
                        {% for username in all_usernames %}
                        <label class="multiselect-option">
                            <input type="checkbox" name="filter_usernames" value="{{ username }}"{% if username in filter_usernames %} checked{% endif %}>
                            {{ username }}
                        </label>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="filter_date_from">Date from</label>
                <input type="date" id="filter_date_from" name="filter_date_from" value="{{ filter_date_from }}">
            </div>
            <div class="form-group">
                <label for="filter_date_to">Date to</label>
                <input type="date" id="filter_date_to" name="filter_date_to" value="{{ filter_date_to }}">
            </div>
        </div>
        <div class="filter-actions">
            <button type="submit" class="search-btn">Apply</button>
            <a href="/" class="clear-btn">Clear</a>
        </div>
    </form>
</div>

<!-- Table container (swapped by live search) -->
<div id="table-container">
    {% include '_table.html' %}
</div>

<script>
    // Geoapify autocomplete (add activity form)
    const GEOAPIFY_API_KEY = '{{ geoapify_api_key }}';
    const addressInput = document.getElementById('address-input');
    const addressHidden = document.getElementById('address-hidden');
    const dropdown = document.getElementById('autocomplete-dropdown');

    let debounceTimer;

    addressInput.addEventListener('input', function () {
        clearTimeout(debounceTimer);
        const query = this.value.trim();

        if (query.length < 3) {
            dropdown.style.display = 'none';
            return;
        }

        debounceTimer = setTimeout(async () => {
            const url = `https://api.geoapify.com/v1/geocode/autocomplete?text=${encodeURIComponent(query)}&limit=5&lang=hr&filter=countrycode:hr&type=street&allowNonVerifiedHouseNumber=true&apiKey=${GEOAPIFY_API_KEY}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const features = data.features || [];

                if (features.length === 0) {
                    dropdown.style.display = 'none';
                    return;
                }

                dropdown.innerHTML = features.map(f => {
                    const label = f.properties.formatted;
                    return `<div class="autocomplete-item" data-address="${label}">${label}</div>`;
                }).join('');

                dropdown.style.display = 'block';

                dropdown.querySelectorAll('.autocomplete-item').forEach(item => {
                    item.addEventListener('click', function () {
                        const selected = this.dataset.address;
                        addressInput.value = selected;
                        addressHidden.value = selected;
                        dropdown.style.display = 'none';
                    });
                });
            } catch (err) {
                console.error('Geoapify error:', err);
            }
        }, 300);
    });

    document.addEventListener('click', function (e) {
        if (!addressInput.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.style.display = 'none';
        }
    });

    // Prevent form submit without selecting from dropdown
    document.querySelector('form[action="/activities"]').addEventListener('submit', function (e) {
        if (!addressHidden.value) {
            e.preventDefault();
            addressInput.style.borderColor = '#dc3545';
            addressInput.placeholder = 'Please select an address from the suggestions';
        }
    });

    // Collapsible filter panel
    const filterToggleBtn = document.getElementById('filter-toggle-btn');
    const filterSection = document.getElementById('filter-section');
    filterToggleBtn.addEventListener('click', function () {
        filterSection.classList.toggle('open');
    });

    // User multiselect dropdown
    const msToggle = document.getElementById('user-multiselect-toggle');
    const msDropdown = document.getElementById('user-multiselect-dropdown');
    const msLabel = document.getElementById('user-multiselect-label');
    const msCheckboxes = msDropdown.querySelectorAll('input[type="checkbox"]');

    function updateMsLabel() {
        const checked = [...msCheckboxes].filter(c => c.checked).map(c => c.value);
        msLabel.textContent = checked.length === 0 ? 'Anyone' : checked.join(', ');
    }

    updateMsLabel();

    msToggle.addEventListener('click', function (e) {
        e.stopPropagation();
        msDropdown.classList.toggle('open');
    });

    msCheckboxes.forEach(cb => cb.addEventListener('change', updateMsLabel));

    document.addEventListener('click', function (e) {
        if (!msToggle.contains(e.target) && !msDropdown.contains(e.target)) {
            msDropdown.classList.remove('open');
        }
    });

    // Live address search
    const searchInput = document.getElementById('search-address');
    const tableContainer = document.getElementById('table-container');
    const filterAddressHidden = document.getElementById('filter-address-hidden');
    const exportBtn = document.getElementById('export-btn');

    function getFilterParams() {
        const params = new URLSearchParams();
        params.set('filter_address', searchInput.value.trim());
        const dateFrom = document.getElementById('filter_date_from').value;
        const dateTo = document.getElementById('filter_date_to').value;
        if (dateFrom) params.set('filter_date_from', dateFrom);
        if (dateTo) params.set('filter_date_to', dateTo);
        [...msCheckboxes].filter(c => c.checked).forEach(c => params.append('filter_usernames', c.value));
        return params;
    }

    function updateExportUrl(params) {
        const exportParams = new URLSearchParams(params);
        exportBtn.href = '/activities/export?' + exportParams.toString();
    }

    let searchDebounce;
    searchInput.addEventListener('input', function () {
        clearTimeout(searchDebounce);
        filterAddressHidden.value = this.value.trim();
        searchDebounce = setTimeout(async () => {
            const params = getFilterParams();
            params.set('partial', '1');
            try {
                const res = await fetch('/?' + params.toString());
                tableContainer.innerHTML = await res.text();
                updateExportUrl(getFilterParams());
                // Update browser URL without reload
                const urlParams = getFilterParams();
                history.replaceState(null, '', '/?' + urlParams.toString());
            } catch (err) {
                console.error('Search error:', err);
            }
        }, 300);
    });
</script>
{% endblock %}
