<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Manager Activity Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        .login-container h2 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }

        .login-form input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-form button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-form button:hover {
            transform: translateY(-2px);
        }

        .login-error {
            color: #dc3545;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        #main-app {
            display: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            flex-grow: 1;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: white;
            color: #667eea;
        }

        .content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .filter-section h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .search-btn {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 15px;
        }

        .activities-list {
            display: grid;
            gap: 15px;
        }

        .activity-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .activity-card:hover {
            transform: translateX(5px);
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .activity-manager {
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
        }

        .activity-time {
            color: #666;
            font-size: 14px;
        }

        .activity-location {
            color: #555;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .activity-description {
            color: #333;
            line-height: 1.6;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-container">
            <h2>🏢 Property Manager Login</h2>
            <form class="login-form" id="login-form">
                <input type="text" id="username" placeholder="Username" required autocomplete="username">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="submit">Login</button>
                <div class="login-error" id="login-error"></div>
            </form>
        </div>
    </div>

    <div id="main-app">
        <div class="container">
            <div class="header">
                <div>
                    <h1>Property Manager Activity Tracker</h1>
                    <p id="logged-in-user"></p>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="content">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('log')">Log Activity</button>
                    <button class="tab" onclick="switchTab('search')">Search Activities</button>
                </div>

                <div class="tab-content active" id="log-tab">
                    <div class="success-msg" id="success-msg">✓ Activity logged successfully!</div>

                    <form id="activity-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="manager-name">Manager Name</label>
                                <input type="text" id="manager-name" required>
                            </div>

                            <div class="form-group">
                                <label for="building">Building/Property</label>
                                <input type="text" id="building" required>
                            </div>

                            <div class="form-group">
                                <label for="date">Date</label>
                                <input type="date" id="date" required>
                            </div>

                            <div class="form-group">
                                <label for="time">Time</label>
                                <input type="time" id="time" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="activity">Activity Description</label>
                            <textarea id="activity" required placeholder="Describe what was done..."></textarea>
                        </div>

                        <button type="submit" class="submit-btn">Log Activity</button>
                    </form>
                </div>

                <div class="tab-content" id="search-tab">
                    <div class="filter-section">
                        <h3>Search Filters</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="filter-manager">Manager Name</label>
                                <input type="text" id="filter-manager" placeholder="Search by manager...">
                            </div>

                            <div class="form-group">
                                <label for="filter-building">Building/Property</label>
                                <input type="text" id="filter-building" placeholder="Search by building...">
                            </div>

                            <div class="form-group">
                                <label for="filter-date">Date</label>
                                <input type="date" id="filter-date">
                            </div>
                        </div>
                        <button class="search-btn" onclick="searchActivities()">Search</button>
                    </div>

                    <div id="activities-list" class="activities-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';

        let currentUser = null;

        async function checkAuth() {
            try {
                const response = await fetch(`${API_URL}/check-auth`, {
                    credentials: 'include'
                });

                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.username;
                    showMainApp();
                    loadActivities();
                } else {
                    showLoginScreen();
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                showLoginScreen();
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({username, password})
                });

                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.username;
                    showMainApp();
                    loadActivities();
                } else {
                    const error = await response.json();
                    document.getElementById('login-error').textContent = error.error || 'Login failed';
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('login-error').textContent = 'Connection error. Check if backend is running.';
                document.getElementById('login-error').style.display = 'block';
            }
        });

        async function logout() {
            try {
                await fetch(`${API_URL}/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (error) {
                console.error('Logout error:', error);
            }
            currentUser = null;
            showLoginScreen();
        }

        function showLoginScreen() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('login-form').reset();
            document.getElementById('login-error').style.display = 'none';
        }

        function showMainApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('logged-in-user').textContent = `Logged in as: ${currentUser}`;
        }

        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('time').value = new Date().toTimeString().slice(0, 5);

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));

            if (tab === 'log') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('log-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('search-tab').classList.add('active');
                loadActivities();
            }
        }

        document.getElementById('activity-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const activity = {
                manager: document.getElementById('manager-name').value,
                building: document.getElementById('building').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                description: document.getElementById('activity').value
            };

            try {
                const response = await fetch(`${API_URL}/activities`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify(activity)
                });

                if (response.ok) {
                    const successMsg = document.getElementById('success-msg');
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        successMsg.style.display = 'none';
                    }, 3000);

                    this.reset();
                    document.getElementById('date').valueAsDate = new Date();
                    document.getElementById('time').value = new Date().toTimeString().slice(0, 5);
                } else if (response.status === 401) {
                    alert('Session expired. Please login again.');
                    showLoginScreen();
                }
            } catch (error) {
                alert('Error saving activity. Please try again.');
                console.error(error);
            }
        });

        async function loadActivities() {
            try {
                const response = await fetch(`${API_URL}/activities`, {
                    credentials: 'include'
                });

                if (response.ok) {
                    const activities = await response.json();
                    displayActivities(activities);
                } else if (response.status === 401) {
                    showLoginScreen();
                }
            } catch (error) {
                console.error('Error loading activities:', error);
            }
        }

        async function searchActivities() {
            const manager = document.getElementById('filter-manager').value;
            const building = document.getElementById('filter-building').value;
            const date = document.getElementById('filter-date').value;

            const params = new URLSearchParams();
            if (manager) params.append('manager', manager);
            if (building) params.append('building', building);
            if (date) params.append('date', date);

            try {
                const response = await fetch(`${API_URL}/activities/search?${params}`, {
                    credentials: 'include'
                });

                if (response.ok) {
                    const activities = await response.json();
                    displayActivities(activities);
                } else if (response.status === 401) {
                    showLoginScreen();
                }
            } catch (error) {
                console.error('Error searching activities:', error);
            }
        }

        function displayActivities(activities) {
            const list = document.getElementById('activities-list');

            if (activities.length === 0) {
                list.innerHTML = '<div class="no-results">No activities found. Log your first activity!</div>';
                return;
            }

            list.innerHTML = activities.map(activity => `
                <div class="activity-card">
                    <div class="activity-header">
                        <span class="activity-manager">${activity.manager}</span>
                        <span class="activity-time">${formatDate(activity.date)} at ${activity.time}</span>
                    </div>
                    <div class="activity-location">📍 ${activity.building}</div>
                    <div class="activity-description">${activity.description}</div>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        document.querySelectorAll('#search-tab input').forEach(input => {
            input.addEventListener('input', function() {
                if (!document.getElementById('filter-manager').value &&
                    !document.getElementById('filter-building').value &&
                    !document.getElementById('filter-date').value) {
                    loadActivities();
                }
            });
        });

        checkAuth();
    </script>
</body>
</html>
